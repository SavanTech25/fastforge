[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "linkedin_rag"
version = "0.1.0"
description = "Generated by FastForge ⚡"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [

    "fastapi>=0.110.0",

    "uvicorn[standard]>=0.29.0",

    "pydantic>=2.0.0",

    "pydantic-settings>=2.0.0",

    "cryptography>=42.0.0",

    "passlib[bcrypt]>=1.7.4",

    "python-dotenv>=1.0.0",

    "fastapi-cache2>=0.2.1",

    "PyJWT>=2.8.0",

    "slowapi>=0.1.9",

    "apscheduler>=3.10.4",

    "sqlalchemy>=2.0.0",

    "psycopg2-binary>=2.9.0",

]

[tool.setuptools.packages.find]
where = ["src"]
include = ["*"]